apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: svc-20260610170630-alerts
  namespace: monitoring
  labels:
    release: monitoring
    app: svc-20260610170630
spec:
  groups:
    - name: svc-20260610170630.rules
      rules:
        - alert: svc-20260610170630Down
          expr: up{job="svc-20260610170630"} == 0
          for: 2m
          labels:
            severity: critical
            service: svc-20260610170630
          annotations:
            summary: "svc-20260610170630 is down"
            description: "No healthy targets for svc-20260610170630 in enlight-staging"
        - alert: svc-20260610170630HighMemory
          expr: container_memory_working_set_bytes{pod=~"svc-20260610170630.*"} > 100000000
          for: 5m
          labels:
            severity: warning
            service: svc-20260610170630
          annotations:
            summary: "svc-20260610170630 high memory"
