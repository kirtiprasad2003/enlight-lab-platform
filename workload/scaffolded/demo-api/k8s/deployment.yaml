apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  namespace: enlight-staging
  labels:
    app: demo-api
    app.kubernetes.io/part-of: enlight-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
        team: enlight-demo
        incident/investigated: "2026-06-10T10:39:33.0725854+05:30"
        incident/root-cause: "probe threshold tuned after AI analysis"
    spec:
      containers:
        - name: api
          image: enlight-fastapi:demo-pass
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: demo-api-secrets
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
