apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: svc-20260611103344-alerts
  namespace: monitoring
  labels:
    release: monitoring
    app: svc-20260611103344
spec:
  groups:
    - name: svc-20260611103344.rules
      rules:
        - alert: svc-20260611103344Down
          expr: up{job="svc-20260611103344"} == 0
          for: 2m
          labels:
            severity: critical
            service: svc-20260611103344
          annotations:
            summary: "svc-20260611103344 is down"
            description: "No healthy targets for svc-20260611103344 in enlight-staging"
        - alert: svc-20260611103344HighMemory
          expr: container_memory_working_set_bytes{pod=~"svc-20260611103344.*"} > 100000000
          for: 5m
          labels:
            severity: warning
            service: svc-20260611103344
          annotations:
            summary: "svc-20260611103344 high memory"
