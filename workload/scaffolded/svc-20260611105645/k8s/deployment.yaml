apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-20260611105645
  namespace: enlight-staging
  labels:
    app: svc-20260611105645
    app.kubernetes.io/part-of: enlight-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-20260611105645
  template:
    metadata:
      labels:
        app: svc-20260611105645
        team: enlight-demo
    spec:
      containers:
        - name: api
          image: enlight-fastapi:demo-pass
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: svc-20260611105645-secrets
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
