apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: svc-20260611100238-alerts
  namespace: monitoring
  labels:
    release: monitoring
    app: svc-20260611100238
spec:
  groups:
    - name: svc-20260611100238.rules
      rules:
        - alert: svc-20260611100238Down
          expr: up{job="svc-20260611100238"} == 0
          for: 2m
          labels:
            severity: critical
            service: svc-20260611100238
          annotations:
            summary: "svc-20260611100238 is down"
            description: "No healthy targets for svc-20260611100238 in enlight-staging"
        - alert: svc-20260611100238HighMemory
          expr: container_memory_working_set_bytes{pod=~"svc-20260611100238.*"} > 100000000
          for: 5m
          labels:
            severity: warning
            service: svc-20260611100238
          annotations:
            summary: "svc-20260611100238 high memory"
