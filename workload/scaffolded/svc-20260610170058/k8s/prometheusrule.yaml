apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: svc-20260610170058-alerts
  namespace: monitoring
  labels:
    release: monitoring
    app: svc-20260610170058
spec:
  groups:
    - name: svc-20260610170058.rules
      rules:
        - alert: svc-20260610170058Down
          expr: up{job="svc-20260610170058"} == 0
          for: 2m
          labels:
            severity: critical
            service: svc-20260610170058
          annotations:
            summary: "svc-20260610170058 is down"
            description: "No healthy targets for svc-20260610170058 in enlight-staging"
        - alert: svc-20260610170058HighMemory
          expr: container_memory_working_set_bytes{pod=~"svc-20260610170058.*"} > 100000000
          for: 5m
          labels:
            severity: warning
            service: svc-20260610170058
          annotations:
            summary: "svc-20260610170058 high memory"
