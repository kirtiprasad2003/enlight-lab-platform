# Single-node cluster - lighter on laptop RAM (recommended for local demos)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: enlight-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
