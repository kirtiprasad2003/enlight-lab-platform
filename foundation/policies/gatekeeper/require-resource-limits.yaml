apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredResources
metadata:
  name: deployment-must-have-limits
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaces: ["enlight-staging"]
  parameters:
    limits:
      - cpu
      - memory
    requests:
      - cpu
      - memory
